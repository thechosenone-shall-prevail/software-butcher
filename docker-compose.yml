version: '3.8'

services:
  hexstrike:
    build: .
    image: hexstrike-kali:latest
    container_name: hexstrike_app
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8888:8888"
    networks:
      - hexstrike_net

networks:
  hexstrike_net:
    driver: bridge
